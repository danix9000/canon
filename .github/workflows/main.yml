name: Main

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**/*.md'
      - '!.github/dependabot.yml'

jobs:
  build-lint-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install test dependencies
        run: sudo apt-get install -y tmux zsh
      - name: Build
        run: go build -o canon .
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
        env:
          TERM: xterm-256color
